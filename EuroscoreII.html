<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EuroSCORE II Calculator - Khoa Ngoại Lồng Ngực</title>
    <style>
        :root {
            --primary: #0ea5e9;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #334155;
            --border: #e2e8f0;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        h2 {
            text-align: center;
            color: var(--primary);
            margin-top: 0;
            font-weight: 600;
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .section {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 8px;
        }

        .section-title {
            font-weight: bold;
            margin-bottom: 15px;
            color: #1e293b;
            font-size: 1.1em;
        }

        .form-group {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
        }

        .form-group.checkbox-group {
            flex-direction: row;
            align-items: center;
        }

        label {
            font-size: 0.9em;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .checkbox-group label {
            margin-bottom: 0;
            margin-left: 8px;
            cursor: pointer;
        }

        input[type="number"], select {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus, select:focus {
            border-color: var(--primary);
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            background: #e0f2fe;
            border: 2px solid var(--primary);
            transition: all 0.3s ease;
        }

        .score-value {
            font-size: 3em;
            font-weight: bold;
            color: var(--primary);
        }

        .decision-text {
            font-size: 1.2em;
            font-weight: 500;
            margin-top: 10px;
        }

        .btn-reset {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: #94a3b8;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            font-weight: bold;
        }
        
        .btn-reset:hover {
            background-color: #64748b;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>EuroSCORE II - Đánh Giá Nguy Cơ Lâm Sàng</h2>
    
    <form id="euroscoreForm">
        <div class="grid-layout">
            
            <!-- Cột 1: Yếu tố bệnh nhân -->
            <div class="section">
                <div class="section-title">1. Yếu Tố Bệnh Nhân</div>
                
                <div class="form-group">
                    <label>Tuổi</label>
                    <input type="number" id="age" min="18" max="120" placeholder="Nhập tuổi..." oninput="calculate()">
                </div>

                <div class="form-group">
                    <label>Giới tính</label>
                    <select id="gender" onchange="calculate()">
                        <option value="male">Nam</option>
                        <option value="female">Nữ</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Chức năng thận (CCr)</label>
                    <select id="renal" onchange="calculate()">
                        <option value="normal">Bình thường (>85 ml/min)</option>
                        <option value="moderate">Trung bình (50-85 ml/min)</option>
                        <option value="severe">Nặng (<50 ml/min)</option>
                        <option value="dialysis">Đang chạy thận (Dialysis)</option>
                    </select>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="extracardiac" onchange="calculate()">
                    <label for="extracardiac">Bệnh mạch máu ngoại biên</label>
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="mobility" onchange="calculate()">
                    <label for="mobility">Vận động kém</label>
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="previous" onchange="calculate()">
                    <label for="previous">Tiền sử mổ tim</label>
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="copd" onchange="calculate()">
                    <label for="copd">Bệnh phổi mạn tính (COPD)</label>
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="endocarditis" onchange="calculate()">
                    <label for="endocarditis">Viêm nội tâm mạc tiến triển</label>
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="critical" onchange="calculate()">
                    <label for="critical">Tình trạng tiền phẫu nguy kịch</label>
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="diabetes" onchange="calculate()">
                    <label for="diabetes">Đái tháo đường dùng Insulin</label>
                </div>
            </div>

            <!-- Cột 2: Yếu tố tim mạch -->
            <div class="section">
                <div class="section-title">2. Yếu Tố Tim Mạch</div>
                
                <div class="form-group">
                    <label>Phân độ suy tim (NYHA)</label>
                    <select id="nyha" onchange="calculate()">
                        <option value="I">Class I</option>
                        <option value="II">Class II</option>
                        <option value="III">Class III</option>
                        <option value="IV">Class IV</option>
                    </select>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="ccs4" onchange="calculate()">
                    <label for="ccs4">Đau thắt ngực khi nghỉ (CCS 4)</label>
                </div>

                <div class="form-group">
                    <label>Phân suất tống máu (LVEF)</label>
                    <select id="lvef" onchange="calculate()">
                        <option value="good">Tốt (>50%)</option>
                        <option value="moderate">Trung bình (31-50%)</option>
                        <option value="poor">Kém (21-30%)</option>
                        <option value="verypoor">Rất kém (≤20%)</option>
                    </select>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="mi" onchange="calculate()">
                    <label for="mi">Nhồi máu cơ tim ≤ 90 ngày</label>
                </div>

                <div class="form-group">
                    <label>Tăng áp động mạch phổi (sPAP)</label>
                    <select id="spap" onchange="calculate()">
                        <option value="normal">Bình thường (≤30 mmHg)</option>
                        <option value="moderate">Trung bình (31-55 mmHg)</option>
                        <option value="severe">Nặng (>55 mmHg)</option>
                    </select>
                </div>
            </div>

            <!-- Cột 3: Yếu tố phẫu thuật -->
            <div class="section">
                <div class="section-title">3. Yếu Tố Phẫu Thuật</div>
                
                <div class="form-group">
                    <label>Độ khẩn cấp</label>
                    <select id="urgency" onchange="calculate()">
                        <option value="elective">Mổ phiên (Elective)</option>
                        <option value="urgent">Khẩn trương (Urgent)</option>
                        <option value="emergency">Cấp cứu (Emergency)</option>
                        <option value="salvage">Tối cấp (Salvage)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Trọng lượng can thiệp (Loại mổ)</label>
                    <select id="weight" onchange="calculate()">
                        <option value="cabg">CABG đơn thuần</option>
                        <option value="single_non_cabg">1 can thiệp (Không phải CABG)</option>
                        <option value="two">2 can thiệp (VD: CABG + 1 Van)</option>
                        <option value="three">≥ 3 can thiệp</option>
                    </select>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="aorta" onchange="calculate()">
                    <label for="aorta">Phẫu thuật động mạch chủ ngực</label>
                </div>
            </div>
        </div>
    </form>

    <div class="result-box" id="resultContainer">
        <div style="font-size: 1.2em; color: #475569;">Nguy cơ tử vong nội viện dự kiến:</div>
        <div class="score-value" id="scoreDisplay">0.88%</div>
        <div class="decision-text" id="decisionDisplay" style="color: var(--success);">Nguy Cơ Thấp - Phù hợp phẫu thuật thường quy</div>
    </div>
    
    <button class="btn-reset" onclick="document.getElementById('euroscoreForm').reset(); calculate();">Làm Mới Biểu Mẫu</button>
</div>

<script>
    function calculate() {
        // Hằng số nền
        let z = -5.324537;

        // 1. Yếu tố bệnh nhân
        const age = parseInt(document.getElementById('age').value) || 0;
        if (age > 60) {
            z += (age - 60) * 0.0285181;
        }

        if (document.getElementById('gender').value === 'female') z += 0.2196434;

        const renal = document.getElementById('renal').value;
        if (renal === 'moderate') z += 0.303553;
        else if (renal === 'severe') z += 0.8592256;
        else if (renal === 'dialysis') z += 0.6421508;

        if (document.getElementById('extracardiac').checked) z += 0.5360268;
        if (document.getElementById('mobility').checked) z += 0.2407181;
        if (document.getElementById('previous').checked) z += 0.6804431;
        if (document.getElementById('copd').checked) z += 0.1886564;
        if (document.getElementById('endocarditis').checked) z += 0.6194522;
        if (document.getElementById('critical').checked) z += 1.086517;
        if (document.getElementById('diabetes').checked) z += 0.3542749;

        // 2. Yếu tố tim mạch
        const nyha = document.getElementById('nyha').value;
        if (nyha === 'II') z += 0.1070545;
        else if (nyha === 'III') z += 0.2958358;
        else if (nyha === 'IV') z += 0.5597929;

        if (document.getElementById('ccs4').checked) z += 0.2226147;

        const lvef = document.getElementById('lvef').value;
        if (lvef === 'moderate') z += 0.3150652;
        else if (lvef === 'poor') z += 0.8084096;
        else if (lvef === 'verypoor') z += 0.9346919;

        if (document.getElementById('mi').checked) z += 0.1528982;

        const spap = document.getElementById('spap').value;
        if (spap === 'moderate') z += 0.1788899;
        else if (spap === 'severe') z += 0.3491475;

        // 3. Yếu tố phẫu thuật
        const urgency = document.getElementById('urgency').value;
        if (urgency === 'urgent') z += 0.3174673;
        else if (urgency === 'emergency') z += 0.7039121;
        else if (urgency === 'salvage') z += 1.362947;

        const weight = document.getElementById('weight').value;
        if (weight === 'single_non_cabg') z += 0.0062118;
        else if (weight === 'two') z += 0.5521478;
        else if (weight === 'three') z += 0.9724533;

        if (document.getElementById('aorta').checked) z += 0.6527205;

        // Tính xác suất %
        const probability = Math.exp(z) / (1 + Math.exp(z));
        const percent = (probability * 100).toFixed(2);

        // Hiển thị kết quả và thay đổi giao diện theo mức độ nguy cơ
        const scoreDisplay = document.getElementById('scoreDisplay');
        const decisionDisplay = document.getElementById('decisionDisplay');
        const resultContainer = document.getElementById('resultContainer');

        scoreDisplay.innerText = percent + '%';

        if (percent < 4.0) {
            scoreDisplay.style.color = 'var(--success)';
            resultContainer.style.borderColor = 'var(--success)';
            resultContainer.style.backgroundColor = '#ecfdf5';
            decisionDisplay.innerText = 'Nguy Cơ Thấp - Phù hợp phẫu thuật thường quy';
            decisionDisplay.style.color = 'var(--success)';
        } else if (percent >= 4.0 && percent <= 8.0) {
            scoreDisplay.style.color = 'var(--warning)';
            resultContainer.style.borderColor = 'var(--warning)';
            resultContainer.style.backgroundColor = '#fffbeb';
            decisionDisplay.innerText = 'Nguy Cơ Trung Bình - Cần hội chẩn Heart Team kỹ càng';
            decisionDisplay.style.color = 'var(--warning)';
        } else {
            scoreDisplay.style.color = 'var(--danger)';
            resultContainer.style.borderColor = 'var(--danger)';
            resultContainer.style.backgroundColor = '#fef2f2';
            decisionDisplay.innerText = 'Nguy Cơ Cao - Cân nhắc giải pháp thay thế (PCI, TAVI) hoặc cần hồi sức đặc biệt';
            decisionDisplay.style.color = 'var(--danger)';
        }
    }

    // Chạy tính toán ngay lần đầu load trang
    window.onload = calculate;
</script>

</body>
</html>
