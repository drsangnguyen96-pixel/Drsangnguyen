<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đánh Giá Toàn Trạng Bệnh Nhân Trước Mổ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --primary: #2c3e50;
            --secondary: #34495e; /* Xanh xám đá hệ Toàn trạng Hệ thống */
            --secondary-hover: #2c3e50;
            --bg-gradient: linear-gradient(135deg, #f4f6f7 0%, #e5e8e8 100%);
            --card-bg: #ffffff;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --success: #2ecc71;
            --info: #3498db;
            --text-main: #2d3436;
            --text-muted: #7f8c8d;
        }

        /* RESET TOÀN BỘ CHỐNG LỖI CO KHUNG CỦA TRÌNH DUYỆT BÊN NGOÀI */
        * { 
            box-sizing: border-box; 
            margin: 0 !important; 
            padding: 0; 
        }

        html, body {
            width: 100% !important;
            min-width: 100vw !important;
            min-height: 100vh;
            background: var(--bg-gradient);
            color: var(--text-main);
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px !important;
        }

        .header { 
            width: 100% !important;
            max-width: 900px !important;
            text-align: center !important;
            margin-top: 10px !important;
            margin-bottom: 30px !important;
            display: block !important;
        }
        
        .header h1 { 
            color: var(--primary) !important; 
            font-size: 24px !important; 
            font-weight: 700 !important;
            text-transform: uppercase !important; 
            line-height: 1.4 !important;
            display: block !important;
            width: 100% !important;
            padding-bottom: 12px !important;
            border-bottom: 3px solid var(--secondary) !important;
        }

        /* Lưới Menu chính */
        .grid-container { 
            display: grid !important; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; 
            width: 100% !important;
            max-width: 900px !important;
            animation: fadeIn 0.5s ease-out;
        }

        .card { 
            background-color: var(--card-bg); 
            padding: 30px 20px !important; 
            border-radius: 16px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
            text-align: center; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            border-top: 5px solid var(--secondary); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            min-height: 140px;
        }
        .card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 15px 30px rgba(52, 73, 94, 0.15); 
        }
        .card h3 { 
            color: var(--primary); 
            font-size: 17px; 
            font-weight: 600;
            line-height: 1.5; 
            margin: 0 !important;
        }

        /* Giao diện Đánh giá chi tiết */
        .assessment-container { 
            display: none; 
            width: 100% !important;
            max-width: 800px !important;
            background: var(--card-bg); 
            padding: 30px 20px !important; 
            border-radius: 16px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.08); 
            animation: fadeIn 0.4s ease-out;
        }
        
        .btn-back { 
            background-color: transparent; 
            color: var(--text-muted); 
            border: 1px solid #dfe6e9; 
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 14px; 
            margin-bottom: 25px !important; 
            font-weight: 600; 
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-back:hover { background-color: #f1f2f6; color: var(--primary); }

        #assessmentTitle { 
            color: var(--primary); 
            margin-bottom: 25px !important; 
            font-size: 20px; 
            font-weight: 700;
            border-bottom: 2px solid #f1f2f6; 
            padding-bottom: 15px; 
        }

        .section-title { 
            margin-top: 20px !important;
            margin-bottom: 12px !important; 
            color: var(--primary); 
            font-size: 16px; 
            font-weight: 700; 
        }
        
        .radio-group, .check-group { 
            margin-bottom: 20px !important; 
        }

        .check-item { 
            display: flex; 
            align-items: flex-start; 
            margin-bottom: 10px !important; 
            font-size: 15px; 
            cursor: pointer; 
            padding: 14px 18px; 
            border-radius: 10px; 
            border: 1px solid #dfe6e9;
            background: #ffffff;
            line-height: 1.4;
        }
        .check-item:hover { 
            border-color: var(--secondary); 
            background: #f2f4f4; 
            transform: translateX(3px);
        }
        
        input[type="checkbox"], input[type="radio"] { 
            margin-right: 15px !important; 
            margin-top: 2px !important;
            width: 18px; 
            height: 18px; 
            cursor: pointer; 
            flex-shrink: 0; 
            accent-color: var(--secondary); 
        }

        .btn-submit { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, var(--secondary), #1a252f); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: 700; 
            cursor: pointer; 
            margin-top: 25px !important; 
            box-shadow: 0 4px 15px rgba(52, 73, 94, 0.3);
        }
        .btn-submit:hover { transform: translateY(-2px); }

        .result-box { 
            margin-top: 25px !important; 
            padding: 20px; 
            border-radius: 12px; 
            font-size: 16px; 
            display: none; 
            line-height: 1.6; 
            border-left: 5px solid;
        }
        
        .alert-danger { border-left-color: var(--danger); background: #fdf2f1; color: #c0392b; }
        .alert-warning { border-left-color: var(--warning); background: #fffcf0; color: #d35400; }
        .alert-success { border-left-color: var(--success); background: #f4faf5; color: #1e8449; }
        .alert-info { border-left-color: var(--info); background: #f2f7fb; color: #2980b9; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            body { padding: 10px !important; }
            .header h1 { font-size: 18px !important; } 
            .assessment-container { padding: 20px 15px !important; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Đánh Giá Toàn Trạng & Chức Năng Hoạt Động Trước Mổ</h1>
    </div>

    <div id="mainGrid" class="grid-container">
        <div class="card" onclick="openTool('asa')">
            <h3>1. Phân loại trạng thái ASA<br><span style="font-size: 13px; font-weight: 400; color: #636e72; margin-top: 8px !important; display: block;">Đánh giá dựa trên bệnh lý nền hệ thống</span></h3>
        </div>
        <div class="card" onclick="openTool('karnofsky')">
            <h3>2. Chỉ số trạng thái Karnofsky (KPS)<br><span style="font-size: 13px; font-weight: 400; color: #636e72; margin-top: 8px !important; display: block;">Đánh giá tỷ lệ (%) tự chăm sóc và làm việc</span></h3>
        </div>
        <div class="card" onclick="openTool('ecog')">
            <h3>3. Thang điểm ECOG / WHO<br><span style="font-size: 13px; font-weight: 400; color: #636e72; margin-top: 8px !important; display: block;">Đánh giá mức độ hạn chế hoạt động (0 - 5 điểm)</span></h3>
        </div>
    </div>

    <div id="assessmentView" class="assessment-container">
        <button class="btn-back" onclick="goBack()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Quay lại
        </button>
        <h2 id="assessmentTitle">Tiêu đề</h2>
        <div id="formContainer"></div>
        <button id="submitBtn" class="btn-submit" onclick="evaluateCurrent()">Xác nhận Đánh giá</button>
        <div id="resultBox" class="result-box"></div>
    </div>

    <script>
        let currentTool = '';

        const tools = {
            asa: {
                title: "Phân loại trạng thái thể chất của ASA",
                render: function() {
                    return `
                        <div class="radio-group">
                            <div class="section-title">Chọn mức độ bệnh lý hệ thống phù hợp:</div>
                            <label class="check-item"><input type="radio" name="asa_class" value="1" checked> <b>ASA I:</b> Bệnh nhân khỏe mạnh bình thường (không hút thuốc, không/uống rất ít rượu)</label>
                            <label class="check-item"><input type="radio" name="asa_class" value="2"> <b>ASA II:</b> Bệnh lý toàn thân nhẹ, kiểm soát tốt (THA/Đột quỵ nhẹ kiểm soát tốt, ĐTĐ typ 2 ổn định, béo phì nhẹ, có hút thuốc)</label>
                            <label class="check-item"><input type="radio" name="asa_class" value="3"> <b>ASA III:</b> Bệnh lý toàn thân nặng, chưa mất bù hoàn toàn (ĐTĐ/THA kiểm soát kém, COPD ổn định, BMI ≥ 40, tiền sử NMCT > 3 tháng)</label>
                            <label class="check-item"><input type="radio" name="asa_class" value="4"> <b>ASA IV:</b> Bệnh lý toàn thân nặng, đe dọa thường trực mạng sống (NMCT/Đột quỵ < 3 tháng, suy chức năng tim/thận tiến triển, sốc nhiễm khuẩn, ARDS)</label>
                            <label class="check-item"><input type="radio" name="asa_class" value="5"> <b>ASA V:</b> Bệnh nhân hấp hối, tiên lượng tử vong nếu không mổ (Phình ĐMC vỡ, chấn thương sọ não nặng có tụt kẹt)</label>
                            <label class="check-item"><input type="radio" name="asa_class" value="6"> <b>ASA VI:</b> Bệnh nhân chết não, phẫu thuật nhằm mục đích hiến tạng</label>
                        </div>
                        <div class="check-group">
                            <div class="section-title">Bối cảnh phẫu thuật:</div>
                            <label class="check-item"><input type="checkbox" id="asa_emergency"> Phẫu thuật CẤP CỨU (Emergency - Thêm chữ "E" vào sau phân độ)</label>
                        </div>
                    `;
                },
                evaluate: function() {
                    const asaClass = document.querySelector('input[name="asa_class"]:checked').value;
                    const isEmergency = document.getElementById('asa_emergency').checked;
                    
                    let suffix = isEmergency ? " E" : "";
                    let baseHtml = `<strong>Kết luận phân loại: ASA ${asaClass}${suffix}</strong><br><br>`;
                    
                    if (asaClass === '1') return { alert: 'alert-success', html: baseHtml + 'Trạng thái lý tưởng. Bệnh nhân có nguy cơ tai biến gây mê - phẫu thuật nền ở mức thấp nhất.' };
                    if (asaClass === '2') return { alert: 'alert-info', html: baseHtml + 'Bệnh nhân có nguy cơ chu phẫu nhẹ. Cần duy trì các thuốc điều trị nền ổn định trong ngày mổ.' };
                    if (asaClass === '3') return { alert: 'alert-warning', html: baseHtml + '⚠️ Bệnh nhân có nguy cơ chu phẫu trung bình - cao do giảm dự trữ cơ quan. Cần tối ưu hóa tối đa các bệnh lý nền trước khi rạch da.' };
                    if (asaClass === '4') return { alert: 'alert-danger', html: baseHtml + '❌ <b>CẢNH BÁO NGUY CƠ CAO:</b> Tình trạng bệnh lý nền đe dọa tính mạng thường trực. Cần hội chẩn liên chuyên khoa, cân nhắc kỹ lợi ích/nguy cơ và giải thích sâu cho gia đình.' };
                    if (asaClass === '5') return { alert: 'alert-danger', html: baseHtml + '🚨 <b>TÌNH TRẠNG NGUY KỊCH:</b> Phẫu thuật mang tính chất cứu vãn tối khẩn cấp.' };
                    return { alert: 'alert-info', html: baseHtml + 'Quy trình chuẩn bị lấy và bảo quản tạng hiến phối hợp trung tâm điều phối.' };
                }
            },
            
            karnofsky: {
                title: "Chỉ số trạng thái hoạt động Karnofsky (KPS)",
                render: function() {
                    return `
                        <div class="radio-group">
                            <div class="section-title">Chọn năng lực sinh hoạt thực tế của người bệnh:</div>
                            <label class="check-item"><input type="radio" name="kps_val" value="100" checked> 100%: Hoạt động bình thường, không có than phiền hay dấu hiệu bệnh lý</label>
                            <label class="check-item"><input type="radio" name="kps_val" value="90"> 90%: Khả năng hoạt động bình thường, dấu hiệu/triệu chứng bệnh nhẹ</label>
                            <label class="check-item"><input type="radio" name="kps_val" value="80"> 80%: Hoạt động bình thường nhưng có gắng sức, một vài dấu hiệu/triệu chứng</label>
                            <label class="check-item"><input type="radio" name="kps_val" value="70"> 70%: Tự chăm sóc bản thân, không thể duy trì hoạt động bình thường hoặc làm việc</label>
                            <label class="check-item"><input type="radio" name="kps_val" value="60"> 60%: Thỉnh thoảng cần giúp đỡ, nhưng có thể tự lo hầu hết các nhu cầu bản thân</label>
                            <label class="check-item"><input type="radio" name="kps_val" value="50"> 50%: Cần sự hỗ trợ thường xuyên và chăm sóc y tế y khoa</label>
                            <label class="check-item"><input type="radio" name="kps_val" value="40"> 40%: Tàn phế, cần sự hỗ trợ và chăm sóc đặc biệt</label>
                            <label class="check-item"><input type="radio" name="kps_val" value="30"> 30%: Tàn phế nặng, chỉ định nhập viện mặc dù cái chết chưa cận kề</label>
                            <label class="check-item"><input type="radio" name="kps_val" value="20"> 20%: Rất bệnh tật, cần điều trị tích cực tại bệnh viện</label>
                            <label class="check-item"><input type="radio" name="kps_val" value="10"> 10%: Hấp hối, diễn tiến cận tử nguy kịch</label>
                            <label class="check-item"><input type="radio" name="kps_val" value="0"> 0%: Tử vong</label>
                        </div>
                    `;
                },
                evaluate: function() {
                    const kps = parseInt(document.querySelector('input[name="kps_val"]:checked').value);
                    let baseHtml = `<strong>Chỉ số Karnofsky (KPS): ${kps}%</strong><br><br>`;
                    
                    if (kps >= 90) return { alert: 'alert-success', html: baseHtml + 'Đánh giá: <b>Khả năng hoạt động bình thường</b>, không có hạn chế lớn.' };
                    if (kps >= 70) return { alert: 'alert-info', html: baseHtml + 'Đánh giá: Bệnh nhân <b>có thể tự chăm sóc cá nhân</b> nhưng không thể thực hiện các hoạt động lao động hoặc làm việc bình thường.' };
                    if (kps >= 50) return { alert: 'alert-warning', html: baseHtml + '⚠️ Đánh giá: <b>Cần trợ giúp y tế</b> và sự hỗ trợ thường xuyên trong các hoạt động sinh hoạt.' };
                    return { alert: 'alert-danger', html: baseHtml + '❌ Đánh giá: <b>Tình trạng tàn phế/nặng</b>, suy giảm chức năng trầm trọng, cần nhập viện điều trị hỗ trợ tích cực.' };
                }
            },

            ecog: {
                title: "Thang điểm trạng thái hoạt động ECOG / WHO",
                render: function() {
                    return `
                        <div class="radio-group">
                            <div class="section-title">Chọn phân độ ECOG tương ứng:</div>
                            <label class="check-item"><input type="radio" name="ecog_score" value="0" checked> Độ 0: Hoạt động bình thường, không hạn chế (như trước khi bệnh)</label>
                            <label class="check-item"><input type="radio" name="ecog_score" value="1"> Độ 1: Hạn chế hoạt động thể lực nặng; có thể làm việc nhẹ hoặc công việc văn phòng</label>
                            <label class="check-item"><input type="radio" name="ecog_score" value="2"> Độ 2: Tự chăm sóc bản thân hoàn toàn nhưng không thể làm việc; nằm giường/ghế < 50% thời gian thức</label>
                            <label class="check-item"><input type="radio" name="ecog_score" value="3"> Độ 3: Chỉ có thể tự chăm sóc giới hạn; nằm giường hoặc ngồi xe lăn > 50% thời gian thức</label>
                            <label class="check-item"><input type="radio" name="ecog_score" value="4"> Độ 4: Tàn phế hoàn toàn; không thể tự chăm sóc; nằm giường/ghế 100% thời gian thức</label>
                            <label class="check-item"><input type="radio" name="ecog_score" value="5"> Độ 5: Tử vong</label>
                        </div>
                    `;
                },
                evaluate: function() {
                    const ecog = parseInt(document.querySelector('input[name="ecog_score"]:checked').value);
                    let baseHtml = `<strong>Điểm số ECOG / WHO: ${ecog} điểm</strong><br><br>`;
                    
                    if (ecog === 0) return { alert: 'alert-success', html: baseHtml + 'Đánh giá: <b>Toàn trạng hoàn hảo</b>, hoạt động chức năng không bị ảnh hưởng.' };
                    if (ecog === 1) return { alert: 'alert-info', html: baseHtml + 'Đánh giá: Dung nạp tốt với các hoạt động sinh hoạt, hạn chế nhẹ khi gắng sức nặng.' };
                    if (ecog === 2) return { alert: 'alert-warning', html: baseHtml + '⚠️ Đánh giá: Khả năng vận động chu phẫu suy giảm. Bệnh nhân bắt đầu cần nghỉ ngơi ban ngày (nhưng vẫn tự chủ vệ sinh, ăn uống).' };
                    if (ecog === 3) return { alert: 'alert-danger', html: baseHtml + '❌ Đánh giá: <b>Hạn chế chức năng hoạt động nặng</b>, phụ thuộc phần lớn vào sự chăm sóc của người khác.' };
                    if (ecog === 4) return { alert: 'alert-danger', html: baseHtml + '❌ Đánh giá: <b>Suy kiệt/Tàn phế hoàn toàn</b>, nằm liệt giường. Nguy cơ biến chứng chu phẫu (phổi, huyết khối, loét) cực kỳ cao.' };
                    return { alert: 'alert-danger', html: baseHtml + 'Bệnh nhân đã tử vong.' };
                }
            }
        };

        function openTool(toolKey) {
            currentTool = toolKey;
            const tool = tools[toolKey];
            document.getElementById('assessmentTitle').innerHTML = tool.title;
            document.getElementById('formContainer').innerHTML = tool.render();
            document.getElementById('resultBox').style.display = 'none';
            document.getElementById('mainGrid').style.display = 'none';
            document.getElementById('assessmentView').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goBack() {
            document.getElementById('assessmentView').style.display = 'none';
            document.getElementById('mainGrid').style.display = 'grid';
            currentTool = '';
        }

        function evaluateCurrent() {
            const resultBox = document.getElementById('resultBox');
            const result = tools[currentTool].evaluate();
            resultBox.innerHTML = result.html;
            resultBox.className = `result-box ${result.alert}`;
            resultBox.style.display = 'block';
        }
    </script>
</body>
</html>
