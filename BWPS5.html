<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thang điểm BWPS - Full Width</title>
    <style>
        /* CSS Cơ bản */
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #2c3e50;
            line-height: 1.5;
            padding: 20px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        
        /* Container mở rộng tối đa */
        .container {
            width: 100%;
            max-width: 1200px; /* Rộng vừa vặn với màn hình lớn */
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            position: relative;
        }
        h2 {
            text-align: center;
            color: #1a5276;
            margin-top: 0;
            font-size: 1.8em;
            margin-bottom: 25px;
            font-weight: 600;
        }
        
        /* Thanh tiến trình */
        .progress-bg {
            background-color: #ecf0f1;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background-color: #2980b9;
            width: 14.28%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .step-counter {
            text-align: center;
            color: #7f8c8d;
            font-size: 1.1em;
            margin-bottom: 12px;
            font-weight: 600;
        }

        /* Các bước (Step) */
        .step-container {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        .step-container.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .category h3 {
            font-size: 1.4em;
            color: #2471a3;
            margin-bottom: 25px;
            text-align: center;
            font-weight: 600;
        }
        
        /* Lưới các lựa chọn - Tự động dàn hàng dựa trên chiều rộng màn hình */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }

        input[type="radio"] { display: none; } 
        
        .option-label {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
            margin: 0;
            border: 2px solid #bdc3c7;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: #fdfdfd;
            color: #34495e;
            font-weight: 500;
            text-align: center;
            font-size: 1.1em;
        }
        .option-label:hover {
            border-color: #5dade2;
            background-color: #ebf5fb;
        }
        input[type="radio"]:checked + .option-label {
            background-color: #d4e6f1;
            border-color: #2980b9;
            color: #154360;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(41, 128, 185, 0.15);
            transform: translateY(-2px);
        }

        /* Nút điều hướng */
        .btn-back {
            background: none;
            border: none;
            color: #7f8c8d;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            padding: 20px 0 0 0;
            display: block;
            width: 100%;
            margin-top: 15px;
            transition: color 0.2s;
        }
        .btn-back:hover { color: #34495e; }

        /* Hộp kết quả */
        .result-step { display: none; text-align: center; }
        .result-box {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 40px 20px;
            border-radius: 16px;
            margin-top: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .score-display {
            font-size: 5em;
            font-weight: 800;
            color: #f1c40f;
            display: block;
            margin: 15px 0;
            line-height: 1;
        }
        .interpretation { font-size: 1.6em; font-weight: 700; }
        
        /* Nhóm nút kết quả */
        .btn-group {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            justify-content: center;
        }
        .btn {
            flex: 1;
            max-width: 300px;
            padding: 18px;
            font-size: 1.1em;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            transition: all 0.2s;
            text-align: center;
        }
        .btn-save { background-color: #27ae60; }
        .btn-save:hover { background-color: #2ecc71; }
        .btn-restart { background-color: #7f8c8d; }
        .btn-restart:hover { background-color: #95a5a6; }
        .btn:active { transform: scale(0.98); }

        /* ==================================================
           TỐI ƯU GIAO DIỆN ĐIỆN THOẠI (MOBILE)
           ================================================== */
        @media screen and (max-width: 600px) {
            body { padding: 10px; align-items: center; }
            .container { padding: 25px 15px; }
            h2 { font-size: 1.5em; margin-bottom: 20px; }
            .category h3 { font-size: 1.2em; }
            .option-label { 
                padding: 15px; 
                font-size: 1.05em; 
            }
            .score-display { font-size: 4em; }
            .interpretation { font-size: 1.3em; }
            
            .btn-group { flex-direction: column; gap: 12px; align-items: center; }
            .btn { max-width: 100%; width: 100%; padding: 16px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Thang điểm Burch-Wartofsky (BWPS)</h2>
    
    <div id="wizardHeader">
        <div class="step-counter" id="stepCounter">Bước 1 / 7</div>
        <div class="progress-bg">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <form id="bwpsForm">
        <div class="step-container active" data-step="0">
            <div class="category">
                <h3>1. Nhiệt độ cơ thể (°C)</h3>
                <div class="options-grid">
                    <input type="radio" id="t1" name="temp" value="0"><label for="t1" class="option-label">≤ 37.1 (0 điểm)</label>
                    <input type="radio" id="t2" name="temp" value="5"><label for="t2" class="option-label">37.2 – 37.7 (5 điểm)</label>
                    <input type="radio" id="t3" name="temp" value="10"><label for="t3" class="option-label">37.8 – 38.2 (10 điểm)</label>
                    <input type="radio" id="t4" name="temp" value="15"><label for="t4" class="option-label">38.3 – 38.8 (15 điểm)</label>
                    <input type="radio" id="t5" name="temp" value="20"><label for="t5" class="option-label">38.9 – 39.2 (20 điểm)</label>
                    <input type="radio" id="t6" name="temp" value="25"><label for="t6" class="option-label">39.3 – 39.9 (25 điểm)</label>
                    <input type="radio" id="t7" name="temp" value="30"><label for="t7" class="option-label">≥ 40.0 (30 điểm)</label>
                </div>
            </div>
        </div>

        <div class="step-container" data-step="1">
            <div class="category">
                <h3>2. Rối loạn hệ thần kinh trung ương</h3>
                <div class="options-grid">
                    <input type="radio" id="c1" name="cns" value="0"><label for="c1" class="option-label">Không có (0 điểm)</label>
                    <input type="radio" id="c2" name="cns" value="10"><label for="c2" class="option-label">Nhẹ: Kích động (10 điểm)</label>
                    <input type="radio" id="c3" name="cns" value="20"><label for="c3" class="option-label">Vừa: Sảng, loạn thần, ngủ lịm (20 điểm)</label>
                    <input type="radio" id="c4" name="cns" value="30"><label for="c4" class="option-label">Nặng: Co giật, hôn mê (30 điểm)</label>
                </div>
            </div>
            <button type="button" class="btn-back" onclick="prevStep()">← Trở lại bước trước</button>
        </div>

        <div class="step-container" data-step="2">
            <div class="category">
                <h3>3. Rối loạn tiêu hóa - gan</h3>
                <div class="options-grid">
                    <input type="radio" id="g1" name="gi" value="0"><label for="g1" class="option-label">Không có (0 điểm)</label>
                    <input type="radio" id="g2" name="gi" value="10"><label for="g2" class="option-label">Vừa: Tiêu chảy, buồn nôn, đau bụng (10 điểm)</label>
                    <input type="radio" id="g3" name="gi" value="20"><label for="g3" class="option-label">Nặng: Vàng da không rõ nguyên nhân (20 điểm)</label>
                </div>
            </div>
            <button type="button" class="btn-back" onclick="prevStep()">← Trở lại bước trước</button>
        </div>

        <div class="step-container" data-step="3">
            <div class="category">
                <h3>4. Nhịp tim (lần/phút)</h3>
                <div class="options-grid">
                    <input type="radio" id="h1" name="hr" value="0"><label for="h1" class="option-label">< 90 (0 điểm)</label>
                    <input type="radio" id="h2" name="hr" value="5"><label for="h2" class="option-label">90 – 109 (5 điểm)</label>
                    <input type="radio" id="h3" name="hr" value="10"><label for="h3" class="option-label">110 – 119 (10 điểm)</label>
                    <input type="radio" id="h4" name="hr" value="15"><label for="h4" class="option-label">120 – 139 (15 điểm)</label>
                    <input type="radio" id="h5" name="hr" value="20"><label for="h5" class="option-label">140 – 149 (20 điểm)</label>
                    <input type="radio" id="h6" name="hr" value="25"><label for="h6" class="option-label">≥ 150 (25 điểm)</label>
                </div>
            </div>
            <button type="button" class="btn-back" onclick="prevStep()">← Trở lại bước trước</button>
        </div>

        <div class="step-container" data-step="4">
            <div class="category">
                <h3>5. Suy tim</h3>
                <div class="options-grid">
                    <input type="radio" id="hf1" name="hf" value="0"><label for="hf1" class="option-label">Không có (0 điểm)</label>
                    <input type="radio" id="hf2" name="hf" value="5"><label for="hf2" class="option-label">Nhẹ: Phù chân (5 điểm)</label>
                    <input type="radio" id="hf3" name="hf" value="10"><label for="hf3" class="option-label">Vừa: Ran ở đáy phổi (10 điểm)</label>
                    <input type="radio" id="hf4" name="hf" value="15"><label for="hf4" class="option-label">Nặng: Phù phổi cấp (15 điểm)</label>
                </div>
            </div>
            <button type="button" class="btn-back" onclick="prevStep()">← Trở lại bước trước</button>
        </div>

        <div class="step-container" data-step="5">
            <div class="category">
                <h3>6. Rung nhĩ</h3>
                <div class="options-grid">
                    <input type="radio" id="af1" name="af" value="0"><label for="af1" class="option-label">Không có (0 điểm)</label>
                    <input type="radio" id="af2" name="af" value="10"><label for="af2" class="option-label">Có (10 điểm)</label>
                </div>
            </div>
            <button type="button" class="btn-back" onclick="prevStep()">← Trở lại bước trước</button>
        </div>

        <div class="step-container" data-step="6">
            <div class="category">
                <h3>7. Yếu tố khởi phát</h3>
                <div class="options-grid">
                    <input type="radio" id="p1" name="precip" value="0"><label for="p1" class="option-label">Không có (0 điểm)</label>
                    <input type="radio" id="p2" name="precip" value="10"><label for="p2" class="option-label">Có (10 điểm)</label>
                </div>
            </div>
            <button type="button" class="btn-back" onclick="prevStep()">← Trở lại bước trước</button>
        </div>
    </form>

    <div class="result-step" id="resultStep">
        <h3 style="color: #1a5276; margin: 0 0 10px 0; font-size: 1.8em;">KẾT QUẢ ĐÁNH GIÁ</h3>
        <div class="result-box">
            <div style="font-size: 1.3em; color: #bdc3c7;">Tổng điểm BWPS:</div>
            <span class="score-display" id="totalScore">0</span>
            <div class="interpretation" id="resultText">Ít có khả năng bão giáp</div>
        </div>
        
        <div class="btn-group">
            <button type="button" class="btn btn-save" id="btnCopy" onclick="saveToClipboard()">📋 SAO CHÉP KẾT QUẢ</button>
            <button type="button" class="btn btn-restart" onclick="restartForm()">🔄 ĐÁNH GIÁ LẠI</button>
        </div>
        <button type="button" class="btn-back" onclick="prevStep()" style="margin-top: 30px;">← Xem lại câu trả lời</button>
    </div>

</div>

<script>
    let currentStep = 0;
    const totalSteps = 7;
    let currentScore = 0;
    let currentInterpretation = "";

    const steps = document.querySelectorAll('.step-container');
    const stepCounter = document.getElementById('stepCounter');
    const progressBar = document.getElementById('progressBar');
    const resultStep = document.getElementById('resultStep');
    const wizardHeader = document.getElementById('wizardHeader');
    const form = document.getElementById('bwpsForm');
    const btnCopy = document.getElementById('btnCopy');

    // Tự động chuyển bước
    document.querySelectorAll('input[type="radio"]').forEach(radio => {
        radio.addEventListener('change', function() {
            setTimeout(() => { nextStep(); }, 250);
        });
    });

    function showStep(stepIndex) {
        steps.forEach((step, index) => {
            step.classList.remove('active');
            if (index === stepIndex) step.classList.add('active');
        });

        if (stepIndex >= totalSteps) {
            wizardHeader.style.display = 'none';
            form.style.display = 'none';
            resultStep.style.display = 'block';
            calculateScore();
            btnCopy.innerText = "📋 SAO CHÉP KẾT QUẢ"; // Reset nút copy
        } else {
            wizardHeader.style.display = 'block';
            form.style.display = 'block';
            resultStep.style.display = 'none';
            
            stepCounter.innerText = `Bước ${stepIndex + 1} / ${totalSteps}`;
            progressBar.style.width = `${((stepIndex + 1) / totalSteps) * 100}%`;
        }
    }

    function nextStep() {
        if (currentStep < totalSteps) {
            currentStep++;
            showStep(currentStep);
        }
    }

    function prevStep() {
        if (currentStep > 0) {
            currentStep--;
            showStep(currentStep);
        }
    }

    function calculateScore() {
        currentScore = 0;
        const categories = ['temp', 'cns', 'gi', 'hr', 'hf', 'af', 'precip'];
        
        categories.forEach(cat => {
            const selected = document.querySelector(`input[name="${cat}"]:checked`);
            if (selected) currentScore += parseInt(selected.value);
        });

        const scoreDisplay = document.getElementById('totalScore');
        const resultText = document.getElementById('resultText');

        scoreDisplay.innerText = currentScore;

        if (currentScore < 25) {
            currentInterpretation = "Ít có khả năng bão giáp";
            resultText.style.color = "#2ecc71"; // Xanh
        } else if (currentScore >= 25 && currentScore <= 44) {
            currentInterpretation = "Đe dọa bão giáp";
            resultText.style.color = "#f39c12"; // Cam
        } else {
            currentInterpretation = "Nhiều khả năng bão giáp";
            resultText.style.color = "#e74c3c"; // Đỏ
        }
        resultText.innerText = currentInterpretation;
    }

    function saveToClipboard() {
        const textToCopy = `Thang điểm BWPS: ${currentScore} điểm. Kết luận: ${currentInterpretation}.`;
        
        // Sao chép im lặng (không có thông báo popup)
        navigator.clipboard.writeText(textToCopy).then(function() {
            // Đổi chữ trên nút để bác sĩ biết là đã click thành công, sau 2s đổi lại
            btnCopy.innerText = "✓ ĐÃ SAO CHÉP";
            setTimeout(() => { btnCopy.innerText = "📋 SAO CHÉP KẾT QUẢ"; }, 2000);
        }).catch(function(err) {
            console.error('Lỗi sao chép', err);
        });
    }

    function restartForm() {
        form.reset(); 
        currentStep = 0;
        showStep(currentStep);
    }
</script>

</body>
</html>
