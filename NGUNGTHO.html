<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sàng Lọc OSA - STOP-BANG</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; margin: 0 !important; padding: 0; }
        html, body { width: 100% !important; min-width: 100vw !important; min-height: 100vh; background: linear-gradient(135deg, #eef2f3 0%, #8e9eab 100%); color: #212121; font-family: 'Inter', sans-serif; }
        body { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 20px !important; }
        .header { width: 100% !important; max-width: 700px !important; text-align: center !important; margin-bottom: 25px !important; display: block !important; }
        .header h1 { color: #2c3e50 !important; font-size: 24px !important; font-weight: 700 !important; text-transform: uppercase !important; line-height: 1.4 !important; display: block !important; padding-bottom: 12px !important; border-bottom: 3px solid #34495e !important; }
        .container { width: 100% !important; max-width: 700px !important; background: #ffffff; padding: 30px 20px !important; border-radius: 16px; box-shadow: 0 15px 35px rgba(44, 62, 80, 0.15); }
        .intro { margin-bottom: 20px !important; color: #555; font-size: 15px; line-height: 1.5; text-align: center; }
        .check-item { display: flex; align-items: flex-start; margin-bottom: 12px !important; font-size: 15px; cursor: pointer; padding: 15px 18px; border-radius: 10px; border: 1px solid #e0e0e0; background: #fafafa; line-height: 1.4; transition: all 0.2s ease; }
        .check-item:hover { border-color: #2c3e50; background: #eaeded; }
        .check-item b { color: #2c3e50; font-size: 16px; margin-right: 5px; }
        input[type="checkbox"] { margin-right: 15px !important; margin-top: 3px !important; width: 20px; height: 20px; cursor: pointer; flex-shrink: 0; accent-color: #2c3e50; }
        .btn-submit { width: 100%; padding: 16px; background: #2c3e50; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 25px !important; transition: all 0.3s ease; text-transform: uppercase; }
        .btn-submit:hover { background: #1a252f; box-shadow: 0 6px 20px rgba(44, 62, 80, 0.3); }
        .result-box { margin-top: 25px !important; padding: 20px; border-radius: 12px; font-size: 16px; display: none; line-height: 1.6; border-left: 5px solid; }
        .alert-danger { border-left-color: #c0392b; background: #fadbd8; color: #b71c1c; }
        .alert-warning { border-left-color: #f39c12; background: #fcf3cf; color: #e67e22; }
        .alert-success { border-left-color: #27ae60; background: #e8f8f5; color: #2e7d32; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Sàng Lọc Ngưng Thở Khi Ngủ (STOP-BANG)</h1>
    </div>
    <div class="container">
        <p class="intro">Công cụ đánh giá nguy cơ Hội chứng Ngưng thở khi ngủ tắc nghẽn (OSA). Mỗi câu trả lời "Có" tương đương 1 điểm.</p>
        <div class="form-group">
            <label class="check-item"><input type="checkbox" value="1"> <div><b>S</b>noring (Ngáy): Ngáy có to không? (Ngáy to hơn tiếng nói chuyện bình thường hoặc đủ to để nghe qua cửa đóng kín).</div></label>
            <label class="check-item"><input type="checkbox" value="1"> <div><b>T</b>ired (Mệt mỏi): Thường xuyên cảm thấy mệt mỏi, uể oải, hoặc buồn ngủ vào ban ngày không?</div></label>
            <label class="check-item"><input type="checkbox" value="1"> <div><b>O</b>bserved (Quan sát): Đã từng có ai nhìn thấy bệnh nhân ngừng thở, nghẹt thở hoặc thở hổn hển trong lúc ngủ chưa?</div></label>
            <label class="check-item"><input type="checkbox" value="1"> <div><b>P</b>ressure (Huyết áp): Đang điều trị Tăng huyết áp hoặc có tiền sử Tăng huyết áp không?</div></label>
            <label class="check-item"><input type="checkbox" value="1"> <div><b>B</b>MI (Chỉ số khối cơ thể): BMI có vượt quá > 35 kg/m² không?</div></label>
            <label class="check-item"><input type="checkbox" value="1"> <div><b>A</b>ge (Tuổi): Bệnh nhân trên > 50 tuổi?</div></label>
            <label class="check-item"><input type="checkbox" value="1"> <div><b>N</b>eck (Vòng cổ): Kích thước vòng cổ lớn? (Nam > 43 cm, Nữ > 41 cm).</div></label>
            <label class="check-item"><input type="checkbox" value="1"> <div><b>G</b>ender (Giới tính): Giới tính Nam?</div></label>
        </div>
        <button class="btn-submit" onclick="evaluateTool()">Tính Điểm STOP-BANG</button>
        <div id="resultBox" class="result-box"></div>
    </div>
    <script>
        function evaluateTool() {
            let score = 0;
            document.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => score += parseInt(cb.value));
            const box = document.getElementById('resultBox');
            let html = `<strong>Tổng điểm STOP-BANG: ${score}/8</strong><br><br>`;
            if (score <= 2) { box.className = 'result-box alert-success'; html += 'Đánh giá: <strong>Nguy cơ Thấp (Low Risk)</strong> bị OSA.'; }
            else if (score <= 4) { box.className = 'result-box alert-warning'; html += 'Đánh giá: <strong>Nguy cơ Trung bình (Intermediate Risk)</strong>.<br>Lưu ý theo dõi sát SpO2 sau rút ống.'; }
            else { box.className = 'result-box alert-danger'; html += 'Đánh giá: <strong>Nguy cơ CAO (High Risk)</strong> bị OSA.<br>⚠️ <strong>Cảnh báo:</strong> Cẩn trọng nguy cơ suy hô hấp chu phẫu. Hạn chế sử dụng Opioid quá liều và theo dõi đường thở ngặt nghèo tại PACU.'; }
            box.innerHTML = html; box.style.display = 'block';
        }
    </script>
</body>
</html>
