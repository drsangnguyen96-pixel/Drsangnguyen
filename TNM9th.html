<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đánh Giá Giai Đoạn Ung Thư Phổi - TNM 9th Edition</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #e2e8f0;
            --success-color: #27ae60;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            padding: 10px;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 5px;
            font-size: 1.3rem;
            text-transform: uppercase;
        }

        .subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .section-title {
            background: var(--primary-color);
            color: white;
            padding: 6px 10px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 4px;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .option-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-item {
            position: relative;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px 12px 10px 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            background: #fafafa;
        }

        .option-item:hover {
            background: #f1f5f9;
        }

        .option-item input[type="radio"] {
            position: absolute;
            left: 12px;
            top: 14px;
            width: 18px;
            height: 18px;
            accent-color: var(--accent-color);
        }

        .option-item.selected {
            border-color: var(--accent-color);
            background-color: #ebf5fb;
            font-weight: 500;
        }

        .desc {
            display: block;
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 2px;
        }

        /* Kết quả */
        .result-panel {
            margin-top: 20px;
            background: #e8f8f5;
            border: 2px solid var(--success-color);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .result-title {
            font-size: 1rem;
            color: var(--primary-color);
            font-weight: bold;
        }

        .result-value {
            font-size: 1.8rem;
            color: var(--success-color);
            font-weight: 800;
            margin: 5px 0;
        }

        .result-detail {
            font-size: 0.85rem;
            color: #555;
            background: rgba(255,255,255,0.7);
            padding: 8px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 5px;
        }

        .btn-reset {
            display: block;
            width: 100%;
            padding: 10px;
            background: #e2e8f0;
            color: #475569;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .btn-reset:hover {
            background: #cbd5e1;
        }

        /* Highlight điểm mới TNM 9 */
        .new-tag {
            background: #e74c3c;
            color: white;
            font-size: 0.7rem;
            padding: 1px 4px;
            border-radius: 3px;
            font-weight: bold;
            margin-left: 5px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Phân Loại Giai Đoạn Ung Thư Phổi</h2>
    <div class="subtitle">Thang điểm Tiêu chuẩn Quốc tế TNM 9th Edition (Cập nhật mới nhất)</div>

    <form id="tnmForm">
        <div class="section-title">T (Tumor) - U Nguyên Phát</div>
        <div class="option-group" id="t-group">
            <label class="option-item"><input type="radio" name="T" value="Tx" checked> <strong>Tx</strong><span class="desc">U nguyên phát không thể đánh giá được</span></label>
            <label class="option-item"><input type="radio" name="T" value="T0"> <strong>T0</strong><span class="desc">Không có bằng chứng về u nguyên phát</span></label>
            <label class="option-item"><input type="radio" name="T" value="Tis"> <strong>Tis</strong><span class="desc">Ung thư biểu mô tại chỗ (Tis / cTis)</span></label>
            <label class="option-item"><input type="radio" name="T" value="T1mi"> <strong>T1mi</strong><span class="desc">U tuyến xâm lấn tối thiểu (≤ 3 cm, diện xâm lấn ≤ 5 mm)</span></label>
            <label class="option-item"><input type="radio" name="T" value="T1a"> <strong>T1a</strong><span class="desc">Kích thước u lớn nhất ≤ 1 cm</span></label>
            <label class="option-item"><input type="radio" name="T" value="T1b"> <strong>T1b</strong><span class="desc">Kích thước u > 1 cm nhưng ≤ 2 cm ở chiều lớn nhất</span></label>
            <label class="option-item"><input type="radio" name="T" value="T1c"> <strong>T1c</strong><span class="desc">Kích thước u > 2 cm nhưng ≤ 3 cm ở chiều lớn nhất</span></label>
            <label class="option-item"><input type="radio" name="T" value="T2a"> <strong>T2a</strong><span class="desc">U > 3 cm nhưng ≤ 4 cm, HOẶC xâm lấn màng phổi tạng hay thùy phổi liền kề/Tổn thương phế quản chính/Liên quan đến xẹp phổi hoặc viêm phổi tắc nghẽn lan đến vùng rốn phổi, ảnh hưởng đến một phần hoặc toàn bộ phổi</span></label>
            <label class="option-item"><input type="radio" name="T" value="T2b"> <strong>T2b</strong><span class="desc">Khối u có kích thước lớn nhất >4 cm nhưng ≤5 cm, có hoặc không có các đặc điểm T2a khác</span></label>
            <label class="option-item"><input type="radio" name="T" value="T3"> <strong>T3</strong><span class="desc">U > 5 cm nhưng ≤ 7 cm, HOẶC xâm lấn thành ngực/màng ngoài tim/nốt vệ tinh cùng thùy</span></label>
            <label class="option-item"><input type="radio" name="T" value="T4"> <strong>T4</strong><span class="desc">U > 7 cm, HOẶC xâm lấn cơ hoành/trung thất/tim/mạch máu lớn/thực quản/khác thùy cùng bên</span></label>
        </div>

        <div class="section-title">N (Lymph Nodes) - Hạch Vùng</div>
        <div class="option-group" id="n-group">
            <label class="option-item"><input type="radio" name="N" value="N0" checked> <strong>N0</strong><span class="desc">Không có di căn hạch vùng</span></label>
            <label class="option-item"><input type="radio" name="N" value="N1"> <strong>N1</strong><span class="desc">Di căn hạch rốn phổi, quanh phế quản hoặc trong phổi cùng bên</span></label>
            <label class="option-item">
                <input type="radio" name="N" value="N2a"> <strong>N2a</strong> <span class="new-tag">MỚI TNM9</span>
                <span class="desc">Di căn hạch trung thất hoặc dưới chạc ba (subcarinal) cùng bên: <strong>Chỉ 1 nhóm hạch (Single station)</strong></span>
            </label>
            <label class="option-item">
                <input type="radio" name="N" value="N2b"> <strong>N2b</strong> <span class="new-tag">MỚI TNM9</span>
                <span class="desc">Di căn hạch trung thất hoặc dưới chạc ba cùng bên: <strong>Nhiều nhóm hạch (Multiple stations)</strong></span>
            </label>
            <label class="option-item"><input type="radio" name="N" value="N3"> <strong>N3</strong><span class="desc">Di căn hạch trung thất/rốn phổi đối bên HOẶC hạch cơ bậc thang/thượng đòn (bất kể bên nào)</span></label>
        </div>

        <div class="section-title">M (Metastasis) - Di Căn Xa</div>
        <div class="option-group" id="m-group">
            <label class="option-item"><input type="radio" name="M" value="M0" checked> <strong>M0</strong><span class="desc">Không có di căn xa</span></label>
            <label class="option-item"><input type="radio" name="M" value="M1a"> <strong>M1a</strong><span class="desc">Nốt u ở phổi đối bên; tràn dịch màng phổi/màng tim ác tính</span></label>
            <label class="option-item"><input type="radio" name="M" value="M1b"> <strong>M1b</strong><span class="desc">Di căn cơ quan ngoài lồng ngực: <strong>Chỉ 1 ổ đơn độc</strong> (Single ngoài lồng ngực)</span></label>
            <label class="option-item">
                <input type="radio" name="M" value="M1c1"> <strong>M1c1</strong> <span class="new-tag">MỚI TNM9</span>
                <span class="desc">Nhiều tổn thương di căn xa ngoài lồng ngực: <strong>Thuộc duy nhất 1 hệ cơ quan</strong></span>
            </label>
            <label class="option-item">
                <input type="radio" name="M" value="M1c2"> <strong>M1c2</strong> <span class="new-tag">MỚI TNM9</span>
                <span class="desc">Nhiều tổn thương di căn xa ngoài lồng ngực: <strong>Nằm ở nhiều hệ cơ quan khác nhau</strong></span>
            </label>
        </div>

        <div class="result-panel">
            <div class="result-title">GIAI ĐOẠN LÂM SÀNG (STAGE)</div>
            <div class="result-value" id="stageOutput">Giai đoạn IA1</div>
            <div class="result-detail" id="formulaOutput">Cấu hình hiện tại: Tx N0 M0</div>
        </div>

        <button type="button" class="btn-reset" onclick="resetForm()">Xóa / Làm mới biểu mẫu</button>
    </form>
</div>

<script>
    // Ma trận logic chẩn đoán Giai đoạn theo tiêu chuẩn TNM 9th Edition (Mới nhất)
    function calculateStage(t, n, m) {
        // Nếu có di căn xa (M1)
        if (m === 'M1a' || m === 'M1b') return 'Giai đoạn IVA';
        if (m === 'M1c1' || m === 'M1c2') return 'Giai đoạn IVB';

        // Nếu không di căn xa (M0)
        if (m === 'M0') {
            if (t === 'Tis' && n === 'N0') return 'Giai đoạn 0';
            if (t === 'Tx' && n === 'N0') return 'Carcinoma Ẩn Giấu (Occult)';

            // Khối N0
            if (n === 'N0') {
                if (t === 'T1mi' || t === 'T1a') return 'Giai đoạn IA1';
                if (t === 'T1b') return 'Giai đoạn IA2';
                if (t === 'T1c') return 'Giai đoạn IA3';
                if (t === 'T2a') return 'Giai đoạn IB';
                if (t === 'T2b') return 'Giai đoạn IIA';
                if (t === 'T3') return 'Giai đoạn IIB';
                if (t === 'T4') return 'Giai đoạn IIIA';
            }

            // Khối N1
            if (n === 'N1') {
                if (t === 'T1a' || t === 'T1b' || t === 'T1c') return 'Giai đoạn IIA'; // Điểm cập nhật hạ bậc TNM9
                if (t === 'T2a' || t === 'T2b') return 'Giai đoạn IIB';
                if (t === 'T3') return 'Giai đoạn IIIA';
                if (t === 'T4') return 'Giai đoạn IIIA';
            }

            // Khối N2a (Single Station) - Cập nhật lớn TNM9
            if (n === 'N2a') {
                if (t === 'T1a' || t === 'T1b' || t === 'T1c') return 'Giai đoạn IIB'; // Chuyển từ IIIA sang IIB
                if (t === 'T2a' || t === 'T2b') return 'Giai đoạn IIIA';
                if (t === 'T3') return 'Giai đoạn IIIA';
                if (t === 'T4') return 'Giai đoạn IIIB';
            }

            // Khối N2b (Multiple Stations) - Cập nhật lớn TNM9
            if (n === 'N2b') {
                if (t === 'T1a' || t === 'T1b' || t === 'T1c') return 'Giai đoạn IIIA';
                if (t === 'T2a' || t === 'T2b') return 'Giai đoạn IIIB'; // Chuyển lên IIIB thay vì IIIA
                if (t === 'T3') return 'Giai đoạn IIIB';
                if (t === 'T4') return 'Giai đoạn IIIB';
            }

            // Khối N3
            if (n === 'N3') {
                if (t === 'T1a' || t === 'T1b' || t === 'T1c' || t === 'T2a' || t === 'T2b') return 'Giai đoạn IIIB';
                if (t === 'T3' || t === 'T4') return 'Giai đoạn IIIC';
            }
        }
        
        return "Chưa đủ dữ kiện xác định";
    }

    function updateTNM() {
        const form = document.getElementById('tnmForm');
        const t = form.elements['T'].value;
        const n = form.elements['N'].value;
        const m = form.elements['M'].value;

        // Cập nhật giao diện class được chọn
        document.querySelectorAll('.option-item').forEach(item => {
            const radio = item.querySelector('input');
            if (radio && radio.checked) {
                item.classList.add('selected');
            } else {
                item.classList.remove('selected');
            }
        });

        // Tính kết quả
        const finalStage = calculateStage(t, n, m);
        
        // Hiển thị ra màn hình
        document.getElementById('stageOutput').innerText = finalStage;
        document.getElementById('formulaOutput').innerText = `Chỉ số ghi nhận: ${t.toUpperCase()} ${n.toUpperCase()} ${m.toUpperCase()}`;
    }

    function resetForm() {
        const form = document.getElementById('tnmForm');
        form.reset();
        updateTNM();
    }

    // Đăng ký sự kiện lắng nghe thay đổi tự động
    document.getElementById('tnmForm').addEventListener('change', updateTNM);

    // Khởi chạy lần đầu
    window.onload = updateTNM;
</script>

</body>
</html>
