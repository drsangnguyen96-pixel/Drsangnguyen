<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đánh Giá Nguy Cơ Dinh Dưỡng Chu Phẫu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --primary: #2d3436;
            --secondary: #27ae60; /* Xanh lá cây cho chủ đề Dinh dưỡng */
            --secondary-hover: #1e8449;
            --bg-gradient: linear-gradient(135deg, #f4f9f4 0%, #e8f5e9 100%);
            --card-bg: #ffffff;
            --danger: #e74c3c;
            --warning: #f39c12;
            --success: #2ccac0;
            --info: #2980b9;
            --text-main: #2d3436;
            --text-muted: #636e72;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background: var(--bg-gradient); 
            color: var(--text-main); 
            padding: 30px 20px; 
            min-height: 100vh;
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { 
            color: var(--primary); 
            font-size: 28px; 
            font-weight: 700;
            text-transform: uppercase; 
            letter-spacing: 1px;
            position: relative;
            display: inline-block;
        }
        .header h1::after {
            content: '';
            position: absolute;
            width: 60%;
            height: 4px;
            background: var(--secondary);
            bottom: -10px;
            left: 20%;
            border-radius: 2px;
        }

        /* Lưới Menu */
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 25px; 
            max-width: 900px; 
            margin: 0 auto; 
            animation: fadeIn 0.5s ease-out;
        }

        .card { 
            background-color: var(--card-bg); 
            padding: 30px 20px; 
            border-radius: 16px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
            text-align: center; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            border-top: 5px solid var(--secondary); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            min-height: 140px;
        }
        .card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 15px 30px rgba(39, 174, 96, 0.15); 
        }
        .card h3 { 
            color: var(--primary); 
            font-size: 18px; 
            font-weight: 600;
            line-height: 1.5; 
        }

        /* Giao diện Đánh giá */
        .assessment-container { 
            display: none; 
            max-width: 800px; 
            margin: 0 auto; 
            background: var(--card-bg); 
            padding: 35px 30px; 
            border-radius: 16px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.08); 
            animation: fadeIn 0.4s ease-out;
        }
        
        .btn-back { 
            background-color: transparent; 
            color: var(--text-muted); 
            border: 1px solid #dfe6e9; 
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 14px; 
            margin-bottom: 25px; 
            font-weight: 600; 
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-back:hover { 
            background-color: #f1f2f6; 
            color: var(--primary);
        }

        #assessmentTitle { 
            color: var(--primary); 
            margin-bottom: 25px; 
            font-size: 24px; 
            font-weight: 700;
            border-bottom: 2px solid #f1f2f6; 
            padding-bottom: 15px; 
        }

        .section-title { 
            margin: 20px 0 12px 0; 
            color: var(--primary); 
            font-size: 16px; 
            font-weight: 700; 
        }

        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 15px;
        }
        .input-group input[type="number"] {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #dfe6e9;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border 0.2s;
        }
        .input-group input[type="number"]:focus {
            border-color: var(--secondary);
        }
        
        .radio-group, .check-group { 
            margin-bottom: 20px; 
        }

        .check-item { 
            display: flex; 
            align-items: flex-start; 
            margin-bottom: 10px; 
            font-size: 15px; 
            cursor: pointer; 
            padding: 14px 18px; 
            border-radius: 10px; 
            border: 1px solid #dfe6e9;
            background: #ffffff;
            transition: all 0.2s ease; 
            font-weight: 500;
            line-height: 1.4;
        }
        .check-item:hover { 
            border-color: var(--secondary); 
            background: #f4faf5; 
            transform: translateX(3px);
        }
        
        input[type="checkbox"], input[type="radio"] { 
            margin-right: 15px; 
            margin-top: 2px;
            width: 18px; 
            height: 18px; 
            cursor: pointer; 
            flex-shrink: 0; 
            accent-color: var(--secondary); 
        }

        /* Nút Submit */
        .btn-submit { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, #2ccac0, var(--secondary)); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: 700; 
            cursor: pointer; 
            margin-top: 25px; 
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
            transition: all 0.3s ease; 
        }
        .btn-submit:hover { 
            box-shadow: 0 6px 20px rgba(39, 174, 96, 0.4);
            transform: translateY(-2px);
        }

        /* Kết quả */
        .result-box { 
            margin-top: 25px; 
            padding: 20px; 
            border-radius: 12px; 
            font-size: 16px; 
            display: none; 
            line-height: 1.6; 
            animation: fadeIn 0.5s ease;
            border-left: 5px solid;
        }
        
        .alert-danger { border-left-color: var(--danger); background: #fdf2f1; color: #c0392b; }
        .alert-warning { border-left-color: var(--warning); background: #fffcf0; color: #d35400; }
        .alert-success { border-left-color: var(--secondary); background: #f4faf5; color: #1e8449; }
        .alert-info { border-left-color: var(--info); background: #f2f7fb; color: #2980b9; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            body { padding: 15px 10px; }
            .assessment-container { padding: 25px 20px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Đánh Giá Nguy Cơ Dinh Dưỡng Chu Phẫu</h1>
    </div>

    <div id="mainGrid" class="grid-container">
        <div class="card" onclick="openTool('pni')">
            <h3>1. Chỉ số PNI<br><span style="font-size: 13px; font-weight: 400; color: #636e72; margin-top: 8px; display: block;">Prognostic Nutritional Index (Onodera)</span></h3>
        </div>
        <div class="card" onclick="openTool('conut')">
            <h3>2. Thang điểm CONUT<br><span style="font-size: 13px; font-weight: 400; color: #636e72; margin-top: 8px; display: block;">Controlling Nutritional Status</span></h3>
        </div>
        <div class="card" onclick="openTool('must')">
            <h3>3. Thang điểm MUST<br><span style="font-size: 13px; font-weight: 400; color: #636e72; margin-top: 8px; display: block;">Malnutrition Universal Screening Tool</span></h3>
        </div>
    </div>

    <div id="assessmentView" class="assessment-container">
        <button class="btn-back" onclick="goBack()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Quay lại
        </button>
        <h2 id="assessmentTitle">Tiêu đề</h2>
        <div id="formContainer">
            </div>
        <button class="btn-submit" onclick="evaluateCurrent()">Xác nhận Đánh giá</button>
        <div id="resultBox" class="result-box"></div>
    </div>

    <script>
        let currentTool = '';

        const tools = {
            pni: {
                title: "Chỉ số Tiên lượng Dinh dưỡng (PNI)",
                render: function() {
                    return `
                        <div class="input-group">
                            <label>Albumin huyết thanh (g/dL):</label>
                            <input type="number" id="pni_alb" step="0.1" placeholder="Ví dụ: 3.8">
                        </div>
                        <div class="input-group">
                            <label>Tổng số tế bào Lympho ( /µL):</label>
                            <input type="number" id="pni_lym" step="1" placeholder="Ví dụ: 1500">
                        </div>
                    `;
                },
                evaluate: function() {
                    const alb = parseFloat(document.getElementById('pni_alb').value);
                    const lym = parseFloat(document.getElementById('pni_lym').value);
                    
                    if (isNaN(alb) || isNaN(lym)) return { alert: 'alert-warning', html: 'Vui lòng nhập đầy đủ cả hai chỉ số xét nghiệm.' };
                    
                    // Công thức PNI
                    const pni = (10 * alb) + (0.005 * lym);
                    let baseHtml = `<strong>Kết quả PNI: ${pni.toFixed(2)}</strong><br><br>`;
                    
                    if (pni > 50) {
                        return { alert: 'alert-success', html: baseHtml + 'Phân loại: <strong>Dinh dưỡng bình thường</strong>.' };
                    } else if (pni >= 45) {
                        return { alert: 'alert-info', html: baseHtml + 'Phân loại: <strong>Suy dinh dưỡng nhẹ</strong>.' };
                    } else if (pni >= 40) {
                        return { alert: 'alert-warning', html: baseHtml + 'Phân loại: <strong>Suy dinh dưỡng trung bình</strong>.<br>⚠️ Nguy cơ xảy ra các biến chứng sau mổ bắt đầu tăng.' };
                    } else {
                        return { alert: 'alert-danger', html: baseHtml + 'Phân loại: <strong>Suy dinh dưỡng nặng</strong>.<br>❌ <strong>Cảnh báo:</strong> Chống chỉ định phẫu thuật đường tiêu hóa chương trình (trừ mổ cấp cứu). Nguy cơ xì hở miệng nối rất cao!' };
                    }
                }
            },
            
            conut: {
                title: "Thang điểm CONUT",
                render: function() {
                    return `
                        <div class="radio-group">
                            <div class="section-title">1. Albumin huyết thanh (g/dL)</div>
                            <label class="check-item"><input type="radio" name="co_alb" value="0" checked> ≥ 3.5 (0 điểm)</label>
                            <label class="check-item"><input type="radio" name="co_alb" value="2"> 3.0 – 3.49 (2 điểm)</label>
                            <label class="check-item"><input type="radio" name="co_alb" value="4"> 2.5 – 2.99 (4 điểm)</label>
                            <label class="check-item"><input type="radio" name="co_alb" value="6"> < 2.5 (6 điểm)</label>
                        </div>

                        <div class="radio-group">
                            <div class="section-title">2. Tổng số Lympho ( /µL)</div>
                            <label class="check-item"><input type="radio" name="co_lym" value="0" checked> ≥ 1600 (0 điểm)</label>
                            <label class="check-item"><input type="radio" name="co_lym" value="1"> 1200 – 1599 (1 điểm)</label>
                            <label class="check-item"><input type="radio" name="co_lym" value="2"> 800 – 1199 (2 điểm)</label>
                            <label class="check-item"><input type="radio" name="co_lym" value="3"> < 800 (3 điểm)</label>
                        </div>

                        <div class="radio-group">
                            <div class="section-title">3. Cholesterol toàn phần (mg/dL)</div>
                            <label class="check-item"><input type="radio" name="co_chol" value="0" checked> ≥ 180 (0 điểm)</label>
                            <label class="check-item"><input type="radio" name="co_chol" value="1"> 140 – 179 (1 điểm)</label>
                            <label class="check-item"><input type="radio" name="co_chol" value="2"> 100 – 139 (2 điểm)</label>
                            <label class="check-item"><input type="radio" name="co_chol" value="3"> < 100 (3 điểm)</label>
                        </div>
                    `;
                },
                evaluate: function() {
                    let score = 0;
                    score += parseInt(document.querySelector('input[name="co_alb"]:checked').value);
                    score += parseInt(document.querySelector('input[name="co_lym"]:checked').value);
                    score += parseInt(document.querySelector('input[name="co_chol"]:checked').value);

                    let baseHtml = `<strong>Tổng điểm CONUT: ${score} điểm</strong><br><br>`;
                    
                    if (score <= 1) {
                        return { alert: 'alert-success', html: baseHtml + 'Đánh giá: <strong>Trạng thái dinh dưỡng bình thường</strong>.' };
                    } else if (score <= 4) {
                        return { alert: 'alert-info', html: baseHtml + 'Đánh giá: <strong>Suy dinh dưỡng mức độ NHẸ</strong>.' };
                    } else if (score <= 8) {
                        return { alert: 'alert-warning', html: baseHtml + 'Đánh giá: <strong>Suy dinh dưỡng mức độ TRUNG BÌNH</strong>.' };
                    } else {
                        return { alert: 'alert-danger', html: baseHtml + 'Đánh giá: <strong>Suy dinh dưỡng mức độ NẶNG</strong>.' };
                    }
                }
            },

            must: {
                title: "Thang điểm sàng lọc nhanh MUST",
                render: function() {
                    return `
                        <div class="radio-group">
                            <div class="section-title">Bước 1: Chỉ số khối cơ thể (BMI)</div>
                            <label class="check-item"><input type="radio" name="mu_bmi" value="0" checked> BMI > 20.0 (0 điểm)</label>
                            <label class="check-item"><input type="radio" name="mu_bmi" value="1"> BMI 18.5 - 20.0 (1 điểm)</label>
                            <label class="check-item"><input type="radio" name="mu_bmi" value="2"> BMI < 18.5 (2 điểm)</label>
                        </div>

                        <div class="radio-group">
                            <div class="section-title">Bước 2: Tỉ lệ sụt cân không mong muốn (Trong 3-6 tháng qua)</div>
                            <label class="check-item"><input type="radio" name="mu_weight" value="0" checked> Sụt cân < 5% (0 điểm)</label>
                            <label class="check-item"><input type="radio" name="mu_weight" value="1"> Sụt cân 5 - 10% (1 điểm)</label>
                            <label class="check-item"><input type="radio" name="mu_weight" value="2"> Sụt cân > 10% (2 điểm)</label>
                        </div>

                        <div class="check-group">
                            <div class="section-title">Bước 3: Yếu tố ảnh hưởng do bệnh lý cấp tính</div>
                            <label class="check-item"><input type="checkbox" id="mu_acute" value="2"> Bệnh nhân không có khả năng ăn uống trên 5 ngày do bệnh lý ngoại khoa / chấn thương cấp tính (+2 điểm)</label>
                        </div>
                    `;
                },
                evaluate: function() {
                    let score = 0;
                    score += parseInt(document.querySelector('input[name="mu_bmi"]:checked').value);
                    score += parseInt(document.querySelector('input[name="mu_weight"]:checked').value);
                    if (document.getElementById('mu_acute').checked) score += 2;

                    let baseHtml = `<strong>Tổng điểm MUST: ${score} điểm</strong><br><br>`;
                    
                    if (score === 0) {
                        return { alert: 'alert-success', html: baseHtml + 'Phân loại: <strong>Nguy cơ THẤP</strong>.<br>👉 <strong>Hướng xử trí:</strong> Đánh giá lại tình trạng dinh dưỡng của bệnh nhân hàng tuần.' };
                    } else if (score === 1) {
                        return { alert: 'alert-warning', html: baseHtml + 'Phân loại: <strong>Nguy cơ TRUNG BÌNH</strong>.<br>👉 <strong>Hướng xử trí:</strong> Theo dõi sát lượng ăn uống thực tế trong vòng 3 ngày. Nếu không cải thiện, cần bổ sung thêm dinh dưỡng đường miệng (ONS).' };
                    } else {
                        return { alert: 'alert-danger', html: baseHtml + 'Phân loại: <strong>Nguy cơ CAO (≥ 2 điểm)</strong>.<br>👉 <strong>Hướng xử trí:</strong> Bắt buộc mời hội chẩn chuyên khoa dinh dưỡng lâm sàng ngay để lập kế hoạch can thiệp tích cực qua đường ruột hoặc đường tĩnh mạch trước phẫu thuật.' };
                    }
                }
            }
        };

        function openTool(toolKey) {
            currentTool = toolKey;
            const tool = tools[toolKey];
            
            document.getElementById('assessmentTitle').innerHTML = tool.title;
            document.getElementById('formContainer').innerHTML = tool.render();
            document.getElementById('resultBox').style.display = 'none';

            document.getElementById('mainGrid').style.display = 'none';
            document.getElementById('assessmentView').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goBack() {
            document.getElementById('assessmentView').style.display = 'none';
            document.getElementById('mainGrid').style.display = 'grid';
            currentTool = '';
        }

        function evaluateCurrent() {
            const resultBox = document.getElementById('resultBox');
            const result = tools[currentTool].evaluate();
            
            resultBox.style.animation = 'none';
            resultBox.offsetHeight; /* trigger reflow */
            resultBox.style.animation = 'fadeIn 0.5s ease';
            
            resultBox.innerHTML = result.html;
            resultBox.className = `result-box ${result.alert}`;
            resultBox.style.display = 'block';
        }
    </script>
</body>
</html>
